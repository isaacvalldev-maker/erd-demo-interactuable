function mkSVG(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function renderTables() {
  tablesG.innerHTML = '';
  schema.tables.forEach(t => {
    const cols = schema.columns[t] || [];
    const pks  = new Set(schema.pks[t] || []);
    const uqs  = new Set(schema.uqs ? (schema.uqs[t] || []) : []);
    const fkMap = {};
    schema.refs.forEach(r => { if (r.from_table === t) fkMap[r.from_col] = r.to_table; });
    const comment = schema.table_comments && schema.table_comments[t];
    const pos = positions[t], h = tableHeights[t], clr = colorMap[t] || '#475569';

    const g = mkSVG('g', { class: 'table-box', transform: `translate(${pos.x},${pos.y})`, 'data-table': t });
    if (comment) g.setAttribute('title', comment);

    g.appendChild(mkSVG('rect', { x:0, y:0, width:COL_W, height:h, rx:8, fill:'white', filter:'url(#shadow)', stroke:clr, 'stroke-width':1.5, 'stroke-opacity':0.3 }));
    g.appendChild(mkSVG('rect', { x:0, y:0, width:COL_W, height:HDR_H, rx:8, fill:clr }));
    g.appendChild(mkSVG('rect', { x:0, y:HDR_H-8, width:COL_W, height:8, fill:clr }));

    const title = mkSVG('text', { x:14, y:24, fill:'white', 'font-size':12, 'font-weight':'600', 'font-family':'Segoe UI,Arial,sans-serif' });
    title.textContent = t;
    g.appendChild(title);

    const cnt = mkSVG('text', { x:COL_W-10, y:24, fill:'rgba(255,255,255,0.65)', 'font-size':11, 'text-anchor':'end', 'font-family':'Segoe UI,Arial,sans-serif' });
    cnt.textContent = cols.length + ' cols';
    g.appendChild(cnt);

    g.appendChild(mkSVG('rect', { x:0, y:HDR_H, width:COL_W, height:h-HDR_H, rx:0, fill:'white' }));
    g.appendChild(mkSVG('rect', { x:0, y:h-16, width:COL_W, height:16, rx:8, fill:'white' }));

    cols.forEach((col, i) => {
      const y = HDR_H + i * ROW_H + 4;
      const isPK = pks.has(col.name), isFK = col.name in fkMap, isUQ = uqs.has(col.name) && !isPK;
      const fill = isPK ? '#fef3c7' : isFK ? '#eef2ff' : isUQ ? '#f0fdf4' : 'transparent';
      const rowBg = mkSVG('rect', { x:1, y:y-1, width:COL_W-2, height:ROW_H-2, rx:3, fill, class:'col-row' });
      if (col.comment) rowBg.setAttribute('title', col.comment);
      g.appendChild(rowBg);

      let bx = 8;
      [['PK', isPK, '#fde68a', '#b45309'], ['FK', isFK, '#e0e7ff', '#4338ca'], ['UQ', isUQ, '#d1fae5', '#047857']].forEach(([lbl, show, bg, fg]) => {
        if (!show) return;
        g.appendChild(mkSVG('rect', { x:bx, y:y+5, width:22, height:14, rx:3, fill:bg }));
        const bt = mkSVG('text', { x:bx+11, y:y+15, fill:fg, 'font-size':9, 'font-weight':'700', 'text-anchor':'middle', 'font-family':'Segoe UI,Arial,sans-serif' });
        bt.textContent = lbl; g.appendChild(bt); bx += 26;
      });

      const nameX = bx > 8 ? bx + 6 : 14;
      const nameClr = isPK ? '#92400e' : isFK ? '#3730a3' : isUQ ? '#047857' : '#1e293b';
      const cn = mkSVG('text', { x:nameX, y:y+16, fill:nameClr, 'font-size':12, 'font-family':'Segoe UI,Arial,sans-serif' });

      const ct = mkSVG('text', { x:COL_W-10, y:y+16, fill:'#94a3b8', 'font-size':11, 'text-anchor':'end', 'font-family':'Segoe UI,Arial,sans-serif' });
      ct.textContent = col.type; g.appendChild(ct);

      if (i < cols.length - 1)
        g.appendChild(mkSVG('line', { x1:8, y1:y+ROW_H-3, x2:COL_W-8, y2:y+ROW_H-3, stroke:'#e2e8f0', 'stroke-width':1 }));

    el.addEventListener('mousedown', e => { drag=true; sx=e.clientX; sy=e.clientY; ox=positions[t].x; oy=positions[t].y; e.stopPropagation(); });

      if (!drag) return;
      positions[t] = { x: ox+(e.clientX-sx)/pz.scale, y: oy+(e.clientY-sy)/pz.scale };
      el.setAttribute('transform', `translate(${positions[t].x},${positions[t].y})`);
      renderEdges();
    });
    window.addEventListener('mouseup', () => { drag=false; });
  });

function getColY(t, col) {
  const idx = (schema.columns[t]||[]).findIndex(c => c.name===col);
  return idx>=0 ? HDR_H + idx*ROW_H + ROW_H/2 + 4 : HDR_H/2;
}

function renderEdges() {
  edgesG.innerHTML = '';
  schema.refs.forEach(r => {
    const fp = positions[r.from_table], tp = positions[r.to_table];
    if (!fp || !tp) return;
    const fy = fp.y + getColY(r.from_table, r.from_col);
    const ty = tp.y + getColY(r.to_table,   r.to_col);
    let fx, tx, cp1, cp2;
    if (fp.x > tp.x + COL_W)       { fx=fp.x;        tx=tp.x+COL_W; cp1=fx-60; cp2=tx+60; }
    else if (tp.x > fp.x + COL_W)  { fx=fp.x+COL_W;  tx=tp.x;       cp1=fx+60; cp2=tx-60; }
    else                            { fx=fp.x;         tx=tp.x;       cp1=fx-80; cp2=tx-80; }
    const path = mkSVG('path', { d:`M${fx},${fy} C${cp1},${fy} ${cp2},${ty} ${tx},${ty}`, fill:'none', stroke:'#6366f1', 'stroke-width':1.5, 'stroke-opacity':0.45, 'marker-end':'url(#arrow)' });
    path.addEventListener('mouseenter', () => { path.setAttribute('stroke','#4f46e5'); path.setAttribute('stroke-opacity','1'); path.setAttribute('stroke-width','2'); path.setAttribute('marker-end','url(#arrow-hover)'); });
    path.addEventListener('mouseleave', () => { path.setAttribute('stroke','#6366f1'); path.setAttribute('stroke-opacity','0.45'); path.setAttribute('stroke-width','1.5'); path.setAttribute('marker-end','url(#arrow)'); });
    edgesG.appendChild(path);
  });
}

// Pan & Zoom
const pz = { x:0, y:0, scale:1 };
function applyT() { viewport.setAttribute('transform', `translate(${pz.x},${pz.y}) scale(${pz.scale})`); }
let panning=false, psx, psy, pox, poy;
svg.addEventListener('mousedown', e => { if (e.target===svg||e.target.id==='svg') { panning=true; psx=e.clientX; psy=e.clientY; pox=pz.x; poy=pz.y; } });
window.addEventListener('mousemove', e => { if (!panning) return; pz.x=pox+(e.clientX-psx); pz.y=poy+(e.clientY-psy); applyT(); });
window.addEventListener('mouseup', () => { panning=false; });
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const d=e.deltaY>0?0.9:1.1, r=svg.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  pz.x=mx-(mx-pz.x)*d; pz.y=my-(my-pz.y)*d;
  pz.scale=Math.min(3,Math.max(0.1,pz.scale*d)); applyT();
}, {passive:false});

// Search / highlight
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  tablesG.querySelectorAll('.table-box').forEach(el => {
    const t = el.getAttribute('data-table').toLowerCase();
    el.classList.toggle('dimmed', q.length>0 && !t.includes(q));
  });
});


// ── Star / Snowflake layout ────────────────────────────────────────────────
function computeLayout() {
  const tables = schema.tables;
  const refs   = schema.refs || [];
  const CW = COL_W + 120;   // card width + horizontal gap

  // Build undirected adjacency
  const adj = {};
  tables.forEach(t => { adj[t] = new Set(); });
  refs.forEach(r => {
    if (adj[r.from_table]) adj[r.from_table].add(r.to_table);
    if (adj[r.to_table])   adj[r.to_table].add(r.from_table);
  });

  // Connected components via BFS
  const visited = new Set(), comps = [];
  tables.forEach(t => {
    if (visited.has(t)) return;
    const comp = [], q = [t]; visited.add(t);
    while (q.length) {
      const n = q.shift(); comp.push(n);
      adj[n].forEach(nb => { if (!visited.has(nb)) { visited.add(nb); q.push(nb); } });
    }
    comps.push(comp);
  });

  const connComps = comps.filter(c => c.length > 1).sort((a,b) => b.length - a.length);
  const isolated  = comps.filter(c => c.length === 1).map(c => c[0]);

  // Update badge
  const badge = document.getElementById('isolated-badge');
  if (badge) badge.textContent = isolated.length + ' sin conexiones · ' + connComps.reduce((s,c)=>s+c.length,0) + ' conectadas';

  const pos = {};
  let ox = 60, oy = 60, rowMaxH = 0;
  const WRAP_X = 14000;

  connComps.forEach(comp => {
    // Hub = highest-degree node
    const hub = comp.reduce((b, t) => adj[t].size > adj[b].size ? t : b, comp[0]);

    // BFS from hub → ring distance
    const compSet = new Set(comp);
    const dist = {}; dist[hub] = 0;
    const q = [hub];
    while (q.length) {
      const cur = q.shift();
      adj[cur].forEach(nb => {
        if (compSet.has(nb) && !(nb in dist)) { dist[nb] = dist[cur] + 1; q.push(nb); }
      });
    }

    // Group by ring index
    const rings = [];
    comp.forEach(t => {
      const d = dist[t] || 0;
      while (rings.length <= d) rings.push([]);
      rings[d].push(t);
    });
    // Sort each ring by name for stable ordering
    rings.forEach(r => r.sort());

    // Compute radii: each ring spaced so cards don't overlap
    const radii = [0];
    for (let ri = 1; ri < rings.length; ri++) {
      const n = rings[ri].length;
      const minR = (n * CW) / (2 * Math.PI);
      radii.push(Math.max(minR, radii[ri-1] + CW * 1.2));
    }

    const maxR = radii[radii.length - 1] + COL_W;
    const cx = ox + maxR, cy = oy + maxR + 80;

    rings.forEach((ring, ri) => {
      ring.forEach((t, i) => {
        const angle = ri === 0 ? -Math.PI/2
                    : (2 * Math.PI * i / ring.length) - Math.PI/2;
        pos[t] = {
          x: Math.round(cx + radii[ri] * Math.cos(angle)),
          y: Math.round(cy + radii[ri] * Math.sin(angle))
        };
      });
    });

    const compW = maxR * 2 + COL_W + 200;
    const compH = maxR * 2 + 200;
    rowMaxH = Math.max(rowMaxH, compH);
    ox += compW;
    if (ox > WRAP_X) { ox = 60; oy += rowMaxH + 300; rowMaxH = 0; }
  });

  // Isolated tables: neat grid below connected area
  const COLS = 8;
  let isoY = oy + rowMaxH + 600;
  if (Object.keys(pos).length > 0) {
    isoY = Math.max(...Object.values(pos).map(p => p.y)) + 700;
  }
  isolated.forEach((t, i) => {
    pos[t] = {
      x: 60 + (i % COLS) * (COL_W + 60),
      y: isoY + Math.floor(i / COLS) * 340
    };
  });

  return pos;
}

// ── Fit all tables to viewport ─────────────────────────────────────────────
function fitAll() {
  const vals = Object.values(positions);
  if (!vals.length) return;
  const minX = Math.min(...vals.map(p => p.x));
  const minY = Math.min(...vals.map(p => p.y));
  const maxX = Math.max(...vals.map(p => p.x)) + COL_W;
  const maxY = Math.max(...vals.map(p => p.y)) + 500;
  const vw = svg.clientWidth, vh = svg.clientHeight;
  const scale = Math.min(vw / (maxX - minX + 120), vh / (maxY - minY + 120), 2) * 0.92;
  pz.scale = scale;
  pz.x = (vw  - (maxX - minX) * scale) / 2 - minX * scale;
  pz.y = (vh  - (maxY - minY) * scale) / 2 - minY * scale;
  applyT();
}

positions = computeLayout();
renderTables();
renderEdges();
fitAll();
</script>
